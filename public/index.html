<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpinBook</title>
    <meta name="description" content="Booking management for DJs and venues." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --fg: #fff;
        --muted: #a8adb0;
        --accent: #00ff87;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 0 0 0.75rem;
      }
      p {
        color: var(--muted);
        max-width: 28rem;
        line-height: 1.6;
        margin: 0 0 1.5rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 1.25rem;
        border-radius: 9999px;
        background: var(--fg);
        color: var(--bg);
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <h1>SpinBook</h1>
    <p>
      This is a static page at <code>/index.html</code>. The main product runs in the Next.js app.
    </p>
    <a href="/">Open SpinBook app</a>
  </body>
</html>
